<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>91NE • CLIENT PREVIEW</title>
    <style>
        body,html{margin:0;padding:0;height:100%;background:#000;overflow:hidden;position:relative;font-family:'Orbitron',monospace}
        .bg{position:absolute;inset:0;background:url('https://via.placeholder.com/1920x1080/0a0a0a/1a1a1a?text=91NE+CLIENT') center/cover;filter:blur(14px);opacity:0.7}
        .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:2}
        .soon{font-size:clamp(48px,9vw,110px);font-weight:900;letter-spacing:6px;text-align:center}
        .gui-mock{width:85%;max-width:920px;background:rgba(15,15,15,0.95);border:2px solid #444;border-radius:12px;overflow:hidden}
        .title-bar{background:#222;padding:15px;text-align:center;font-size:18px;letter-spacing:4px}
        .chain{position:absolute;width:70px;height:70px;border:2px solid #555;border-radius:50%;animation:chainFloat 15s linear infinite;opacity:0.35}
        @keyframes chainFloat{0%{transform:translateY(120vh) rotate(0deg)}100%{transform:translateY(-100px) rotate(720deg)}}
    </style>
</head>
<body>

<div class="bg"></div>

<div class="overlay">
    <div class="soon">CLICK GUI</div>
    <div style="margin:20px 0 40px;font-size:18px;opacity:0.7">PREVIEW • SOON COMING</div>
    
    <div class="gui-mock">
        <div class="title-bar">91NE CLIENT — INTERNAL GUI</div>
        <div style="padding:100px 40px;text-align:center;color:#666;font-size:24px">
            FULL CLIENT INTERFACE<br>
            <span style="font-size:16px;display:block;margin-top:20px">COMING VERY SOON</span>
        </div>
    </div>
    
    <a href="index.html" style="margin-top:50px;color:#777;text-decoration:none">← Back to Main Site</a>
</div>

<script>
// Floating Chains
for(let i = 0; i < 14; i++){
    const chain = document.createElement('div');
    chain.className = 'chain';
    chain.style.left = Math.random() * 100 + 'vw';
    chain.style.animationDelay = '-' + Math.random() * 18 + 's';
    chain.style.width = chain.style.height = (35 + Math.random() * 70) + 'px';
    document.body.appendChild(chain);
}
</script>
</body>
</html>
