<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>91NE CLIENT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:'Space Grotesk',sans-serif;overflow-x:hidden;cursor:none}

        /* BOOT */
        #boot-screen{position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#0f0;font-family:'Orbitron',monospace;transition:opacity 1.5s}
        .boot-text{font-size:15px;letter-spacing:4px;animation:typing 2.8s steps(45,end) forwards, blink 0.8s infinite}
        @keyframes typing{from{width:0}to{width:100%}}
        @keyframes blink{50%{opacity:0}}

        /* CURSOR */
        #cur{position:fixed;top:0;left:0;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
        #cur-diamond{width:22px;height:22px;border:2px solid rgba(255,255,255,0.95);transform:rotate(45deg);background:rgba(255,255,255,0.06);filter:drop-shadow(0 0 12px #fff)}
        #cur-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border:1px solid rgba(255,255,255,0.25);border-radius:50%;animation:ringPulse 1.6s infinite}
        @keyframes ringPulse{0%,100%{opacity:0.2;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1.4)}}

        nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:20px 60px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.95),transparent)}
        .nav-logo{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:6px}
        .preview-btn{padding:12px 32px;background:rgba(255,255,255,0.1);border:1px solid #fff;border-radius:50px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:0.3s}
        .preview-btn:hover{background:#fff;color:#000;transform:scale(1.05)}

        #hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
        .hero-title{font-family:'Orbitron',monospace;font-size:clamp(70px,12vw,140px);font-weight:900;background:linear-gradient(#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    </style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot-screen">
    <div style="font-size:32px;margin-bottom:30px">91NE CLIENT</div>
    <div class="boot-text">INITIALIZING CORE SYSTEMS...</div>
</div>

<!-- CURSOR -->
<div id="cur">
    <div id="cur-ring"></div>
    <div id="cur-diamond"></div>
</div>

<!-- NAV -->
<nav>
    <div class="nav-logo">91NE</div>
    <div>
        <a href="preview.html" class="preview-btn">PREVIEW CLIENT</a>
    </div>
</nav>

<!-- HERO -->
<section id="hero">
    <h1 class="hero-title">91NE</h1>
    <p style="margin:25px 0 50px;letter-spacing:6px;color:#888;font-size:15px">PRECISION ENGINEERED • BUILT DIFFERENT</p>
    <a href="https://discord.gg/2HPvTq2VkW" class="preview-btn" style="font-size:16px;padding:18px 48px">GET ACCESS</a>
</section>

<script>
// Boot Screen
setTimeout(() => {
    document.getElementById('boot-screen').style.opacity = '0';
}, 2200);

// Smooth Cursor
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
});
</script>
</body>
</html>
